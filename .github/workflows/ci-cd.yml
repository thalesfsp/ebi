name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
      name: Go build
      runs-on: ubuntu-latest
      steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: v2.12.2
          args: --timeout 10m
